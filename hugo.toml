baseURL = 'https://blog.gilhwan.com/'
title = "Gil's Blog"
theme = "hugo-blog-awesome"
languageCode = 'ko'
defaultContentLanguage = "ko"
enableEmoji = true
ignoreErrors = ["error-missing-instagram-accesstoken"]

[author]
  name = "Gil Cheong"
  email = "mowing.home9o@icloud.com"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4

[Languages.ko]
  languageName = "한국어"
  languageCode = "ko"
  contentDir = "content/ko"
  weight = 1

  [Languages.ko.menu]
  [[Languages.ko.menu.main]]
    pageRef = "/"
    name = "홈"
    url = "/"
    weight = 10
  [[Languages.ko.menu.main]]
    pageRef = "posts"
    name = "글"
    url = "/posts/"
    weight = 20
  [[Languages.ko.menu.main]]
    pageRef = "about"
    name = "소개"
    url = "/about/"
    weight = 30

  [Languages.ko.params]
    sitename = "Gil's Blog"
    defaultColor = "dark"
    description = "Novice Wanderer"
    mainSections = ["posts"]
    toc = true
    tocOpen = false
    goToTop = true

    [Languages.ko.params.author]
      avatar = "avatar.jpg"
      name = "Gil"
      email = "mowing.home9o@icloud.com"
      intro = "Gil's Blog"
      description = "Novice Wanderer"
